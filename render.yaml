services:
  - type: web
    name: orange-web
    runtime: php
    plan: starter
    buildCommand: |
      composer install --no-interaction --no-dev --optimize-autoloader
      npm ci
      npm run build
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    preDeployCommand: |
      php artisan key:generate --force
      php artisan migrate --force
    envVars:
      - key: APP_NAME
        value: Orange
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: orange-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: orange-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: orange-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: orange-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: orange-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database

databases:
  - name: orange-db
    databaseName: orange
    user: orange
    plan: starter
