services:
  - type: web
    name: orange-laravel
    env: docker
    plan: free
    region: singapore # Change as needed
    dockerfilePath: Dockerfile
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: ep-snowy-butterfly-aive3zr8.c-4.us-east-1.aws.neon.tech
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        value: neondb
      - key: DB_USERNAME
        value: neondb_owner
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: FILESYSTEM_DISK
        value: public
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: database
